<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID X GUILDA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet"><style>
body {font-family:'Orbitron', Arial; margin:0; background:#000; color:#fff;}
header {background:linear-gradient(90deg,#ff0000,#ff7300); padding:20px; text-align:center; font-size:26px;}
section {padding:20px;}
h2 {color:#ff7300;}
.card {background:#111; padding:15px; margin:10px 0; border-radius:10px; border:1px solid red;}
button {background:linear-gradient(90deg,#ff0000,#ff7300); color:#fff; border:none; padding:10px; border-radius:5px; cursor:pointer;}
input {width:100%; padding:10px; margin:5px 0;}
.modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center;}
.modal-content {background:#111; padding:20px; border-radius:10px; width:90%; max-width:400px;}
.close {cursor:pointer; color:red; float:right;}
</style></head>
<body><header>🔥 VOID X GUILDA 🔥</header><!-- LOGIN ADMIN --><section id="loginSection">
<h2>🔒 Login Admin</h2>
<input type="password" id="senha" placeholder="Digite a senha">
<button onclick="login()">Entrar</button>
</section><!-- CONTEÚDO DO SITE --><div id="conteudo" style="display:none;"><section>
<h2>📊 Status da Guilda</h2>
<div class="card">👥 Membros: 55/55</div>
<div class="card">🏆 Nível: 5</div>
</section><section>
<h2>🏆 Ranking</h2>
<div id="ranking"></div>
</section><section>
<h2>🎉 Eventos</h2>
<div class="card">
Full Gás Day<br>
<button onclick="abrirModal()">Ver calendário</button>
</div>
</section><section>
<h2>📩 Recrutamento</h2>
<form onsubmit="enviarWhats(event)">
<input type="text" id="nome" placeholder="Nome" required>
<input type="text" id="id" placeholder="ID" required>
<input type="text" id="nivelJogador" placeholder="Nível" required>
<button type="submit">Enviar via WhatsApp</button>
</form>
</section><section id="adminPanel" style="display:none;">
<h2>⚙️ Painel Admin</h2>
<input type="text" id="nomeRank" placeholder="Nome">
<input type="text" id="pontosRank" placeholder="Pontos">
<button onclick="addRanking()">Adicionar Ranking</button>
</section></div><div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="fecharModal()">X</span>
<h2>📅 Calendário</h2>
<p>Quarta - 19:00</p>
<p>Segunda - 16:00</p>
</div>
</div><script>
const senhaCorreta = "Freefire"; // MUDE ISSO

function login(){
 let senha = document.getElementById('senha').value;
 if(senha === senhaCorreta){
   document.getElementById('loginSection').style.display='none';
   document.getElementById('conteudo').style.display='block';
   document.getElementById('adminPanel').style.display='block';
 } else {
   alert('Senha incorreta!');
 }
}

function abrirModal(){document.getElementById('modal').style.display='flex';}
function fecharModal(){document.getElementById('modal').style.display='none';}

function enviarWhats(event){
 event.preventDefault();
 let nome=document.getElementById('nome').value;
 let id=document.getElementById('id').value;
 let nivel=document.getElementById('nivelJogador').value;
 let msg=`Quero entrar na guilda VOID X:%0A Nome:${nome}%0A ID:${id}%0A Nível:${nivel}`;
 window.open(`https://wa.me/5189612793?text=${msg}`);
}

function addRanking(){
 let nome=document.getElementById('nomeRank').value;
 let pontos=document.getElementById('pontosRank').value;
 let div=document.getElementById('ranking');
 let card=document.createElement('div');
 card.className='card';
 card.innerText=`${nome} - ${pontos} pts`;
 div.appendChild(card);
}
</script></body>
 </html>
