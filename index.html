<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID X GUILDA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
body {font-family:'Orbitron', Arial; margin:0; background:#000; color:#fff;}
header {background:linear-gradient(90deg,#ff0000,#ff7300); padding:20px; text-align:center; font-size:26px;}
section {padding:20px;}
h2 {color:#ff7300;}
.card {background:#111; padding:15px; margin:10px 0; border-radius:10px; border:1px solid red;}
button {background:linear-gradient(90deg,#ff0000,#ff7300); color:#fff; border:none; padding:10px; border-radius:5px; cursor:pointer;}
input, textarea, select {width:100%; padding:10px; margin:5px 0;}
.progress {background:#333; border-radius:10px;}
.progress-bar {background:#ff0000; padding:10px; text-align:center;}
</style>
</head>
<body><header>🔥 VOID X GUILDA 🔥</header><section>
<h2>📊 Status da Guilda</h2>
<div class="card">👥 Membros: 55/55</div>
<div class="card">🏆 Nível: 5</div>
<div class="progress"><div class="progress-bar" style="width:70%">128k / 185k</div></div>
</section><section>
<h2>🏆 Ranking</h2>
<div id="ranking"></div>
</section><section>
<h2>👑 Destaques</h2>
<div id="destaqueSemana"></div>
<div id="destaqueMes"></div>
</section><section>
<h2>🎖️ Hall da Fama</h2>
<div id="hallFama"></div>
</section><section>
<h2>⚔️ Presença na Guerra</h2>
<input id="nomePresenca" placeholder="Seu nome">
<button onclick="marcarPresenca()">Confirmar presença</button>
<div id="presenca"></div>
</section><section>
<h2>⚔️ Escalação</h2>
<div id="escalacao"></div>
</section><section>
<h2>📊 Resultados</h2>
<div id="resultados"></div>
</section><section>
<h2>🎯 Funções</h2>
<select id="funcao">
<option>Rushador</option>
<option>Suporte</option>
<option>Sniper</option>
<option>Líder</option>
</select>
<button onclick="addFuncao()">Adicionar função</button>
<div id="funcoes"></div>
</section><section>
<h2>👤 Perfil Jogador</h2>
<input id="perfilNome" placeholder="Nome">
<input id="perfilId" placeholder="ID">
<input id="perfilFuncao" placeholder="Função">
<button onclick="addPerfil()">Adicionar</button>
<div id="perfil"></div>
</section><section>
<h2>💬 Mural</h2>
<textarea id="msg"></textarea>
<button onclick="addMsg()">Enviar</button>
<div id="mural"></div>
</section><section>
<h2>📩 Recrutamento</h2>
<form onsubmit="enviarWhats(event)">
<input id="nome" placeholder="Nome">
<input id="id" placeholder="ID">
<input id="nivelJogador" placeholder="Nível">
<button type="submit">Enviar WhatsApp</button>
</form>
</section><section>
<h2>📸 Galeria</h2>
<input id="linkImg" placeholder="Link da imagem">
<button onclick="addImg()">Adicionar</button>
<div id="galeria"></div>
</section><section>
<h2>⚠️ Avisos</h2>
<div id="avisos"></div>
</section><script>
function salvar(){localStorage.setItem('site',document.body.innerHTML)}
function carregar(){if(localStorage.getItem('site')) document.body.innerHTML=localStorage.getItem('site')}

function add(id,val){document.getElementById(id).innerHTML+=`<div class='card'>${val}</div>`;salvar();}

function marcarPresenca(){add('presenca',nomePresenca.value)}
function addFuncao(){add('funcoes',funcao.value)}
function addPerfil(){add('perfil',perfilNome.value+' - '+perfilFuncao.value)}
function addMsg(){add('mural',msg.value);msg.value=''}
function addImg(){add('galeria',`<img src='${linkImg.value}' width='100%'>`)}

function enviarWhats(e){
 e.preventDefault();
 let msg=`Quero entrar VOID X:%0A${nome.value}%0A${id.value}%0A${nivelJogador.value}`;
 window.open(`https://wa.me/5189612793?text=${msg}`);
}

window.onload=carregar;
</script></body>
 </html>
