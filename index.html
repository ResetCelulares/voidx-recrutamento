<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID X GUILDA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet"><style>
body {
  font-family:'Orbitron', Arial;
  margin:0;
  background:#000;
  color:#fff;
}

header {
  background:linear-gradient(90deg,#5f00ff,#8a2be2);
  padding:20px;
  text-align:center;
  font-size:26px;
  box-shadow:0 0 20px #8a2be2;
}

section {padding:20px;}

h2 {
  color:#8a2be2;
  text-shadow:0 0 10px #8a2be2;
}

.card {
  background:#0a0a0a;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #8a2be2;
  box-shadow:0 0 10px rgba(138,43,226,0.5);
}

button {
  background:linear-gradient(90deg,#5f00ff,#8a2be2);
  color:#fff;
  border:none;
  padding:10px;
  border-radius:5px;
  cursor:pointer;
  box-shadow:0 0 10px #8a2be2;
  transition:0.2s;
}

button:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px #8a2be2;
}

input, textarea, select {
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#111;
  border:1px solid #8a2be2;
  color:#fff;
}

.progress {
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.progress-bar {
  background:linear-gradient(90deg,#5f00ff,#8a2be2);
  padding:10px;
  text-align:center;
  animation:glow 2s infinite alternate;
}

@keyframes glow {
  from {box-shadow:0 0 5px #8a2be2;}
  to {box-shadow:0 0 20px #8a2be2;}
}
</style></head><body><header>🔥 VOID X GUILDA 🔥</header><section>
<h2>📊 Status da Guilda</h2>
<div class="card">👥 Membros: 45/55</div>
<div class="card">🏆 Nível: 6</div>
<div class="card">📈 Progresso:</div>
<div class="progress"><div class="progress-bar" style="width:70%">128k / 185k</div></div>
</section><section>
<h2>🏆 Ranking</h2>
<div id="ranking"></div>
</section><section>
<h2>👑 Destaques da Semana</h2>
<div id="destaqueSemana"></div>
</section><section>
<h2>🏆 Destaques do Mês</h2>
<div id="destaqueMes"></div>
</section><section>
<h2>⚔️ Presença na Guerra</h2>
<input id="nomePresenca" placeholder="Seu nome">
<button onclick="marcarPresenca()">Confirmar presença</button>
<div id="presenca"></div>
</section><section>
<h2>💬 Mural</h2>
<textarea id="msg"></textarea>
<button onclick="addMsg()">Enviar</button>
<div id="mural"></div>
</section><script>
function salvar(){localStorage.setItem('site',document.body.innerHTML)}
function carregar(){if(localStorage.getItem('site')) document.body.innerHTML=localStorage.getItem('site')}

function add(id,val){document.getElementById(id).innerHTML+=`<div class='card'>${val}</div>`;salvar();}

function marcarPresenca(){add('presenca',nomePresenca.value)}
function addMsg(){add('mural',msg.value);msg.value=''}

window.onload=carregar;
</script><!-- IA DA GUILDA --><section>
<h2>🤖 IA VOID X</h2>
<input id="pergunta" placeholder="Faça sua pergunta para a IA">
<button onclick="perguntarIA()">Perguntar</button>
<div id="resposta" class="card">A IA responderá aqui...</div>
</section><script>
async function perguntarIA() {

  const pergunta = document.getElementById("pergunta").value;

  document.getElementById("resposta").innerHTML = "Pensando... 🤖";

  try {

    const req = await fetch("http://localhost:3000/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        pergunta
      })
    });

    const data = await req.json();

    document.getElementById("resposta").innerHTML = data.resposta;

  } catch (erro) {

    document.getElementById("resposta").innerHTML = "Erro ao conectar com a IA.";

  }
}
</script></body>
 </html>
