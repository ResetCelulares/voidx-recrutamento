<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID X GUILDA</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet"><style>
body {font-family:'Orbitron', Arial; margin:0; background:#000; color:#fff;}
header {background:linear-gradient(90deg,#ff0000,#ff7300); padding:20px; text-align:center; font-size:26px;}
section {padding:20px;}
h2 {color:#ff7300;}
.card {background:#111; padding:15px; margin:10px 0; border-radius:10px; border:1px solid red;}
button {background:linear-gradient(90deg,#ff0000,#ff7300); color:#fff; border:none; padding:10px; border-radius:5px; cursor:pointer;}
input {width:100%; padding:10px; margin:5px 0;}
.modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center;}
.modal-content {background:#111; padding:20px; border-radius:10px; width:90%; max-width:400px;}
.close {cursor:pointer; color:red; float:right;}
</style></head>
<body><header>🔥 VOID X GUILDA 🔥</header><section>
<h2>📊 Status da Guilda</h2>
<div class="card">👥 Membros: 55/55</div>
<div class="card">🏆 Nível: 5</div>
</section><section>
<h2>🏆 Ranking</h2>
<div id="ranking"></div>
</section><section>
<h2>👑 Destaques da Semana</h2>
<div id="destaqueSemana"></div>
</section><section>
<h2>🏆 Destaques do Mês</h2>
<div id="destaqueMes"></div>
</section><section>
<h2>🎉 Eventos</h2>
<div class="card">
Full Gás Day<br>
<button id="btnEvento">Ver calendário</button>
</div>
</section><section>
<h2>📩 Recrutamento</h2>
<form id="formRecrutamento">
<input type="text" id="nome" placeholder="Nome" required>
<input type="text" id="id" placeholder="ID" required>
<input type="text" id="nivelJogador" placeholder="Nível" required>
<button type="submit">Enviar via WhatsApp</button>
</form>
</section><section>
<button id="btnAdmin">🔒 Área Admin</button>
</section><!-- LOGIN ADMIN --><div class="modal" id="loginAdmin">
<div class="modal-content">
<span class="close" id="fecharLogin">X</span>
<h2>🔒 Login Admin</h2>
<input type="password" id="senha" placeholder="Senha">
<button id="btnLogin">Entrar</button>
</div>
</div><!-- PAINEL ADMIN --><div class="modal" id="adminPanel">
<div class="modal-content">
<span class="close" id="fecharAdmin">X</span>
<h2>⚙️ Painel Admin</h2>
<input type="text" id="nomeRank" placeholder="Nome">
<input type="text" id="pontosRank" placeholder="Pontos">
<button id="addRank">Adicionar Ranking</button><h3>Destaque Semana</h3>
<input type="text" id="nomeSemana" placeholder="Nome">
<button id="addSemana">Adicionar</button><h3>Destaque Mês</h3>
<input type="text" id="nomeMes" placeholder="Nome">
<button id="addMes">Adicionar</button>
</div>
</div><!-- MODAL EVENTO --><div class="modal" id="modalEvento">
<div class="modal-content">
<span class="close" id="fecharEvento">X</span>
<h2>📅 Calendário</h2>
<p>Segunda - 19:00</p>
<p>Quarta - 16:00</p>
</div>
</div><script>
const senhaCorreta = "voidx123";

// ELEMENTOS
const loginModal = document.getElementById('loginAdmin');
const adminModal = document.getElementById('adminPanel');
const eventoModal = document.getElementById('modalEvento');

// BOTÕES

document.getElementById('btnEvento').onclick = () => eventoModal.style.display = 'flex';
document.getElementById('fecharEvento').onclick = () => eventoModal.style.display = 'none';

// ADMIN

document.getElementById('btnAdmin').onclick = () => loginModal.style.display = 'flex';
document.getElementById('fecharLogin').onclick = () => loginModal.style.display = 'none';
document.getElementById('fecharAdmin').onclick = () => adminModal.style.display = 'none';

// LOGIN

document.getElementById('btnLogin').onclick = () => {
  const senha = document.getElementById('senha').value;
  if(senha === senhaCorreta){
    loginModal.style.display = 'none';
    adminModal.style.display = 'flex';
  } else {
    alert('Senha incorreta');
  }
};

// RECRUTAMENTO

document.getElementById('formRecrutamento').addEventListener('submit', function(e){
  e.preventDefault();
  const nome = document.getElementById('nome').value;
  const id = document.getElementById('id').value;
  const nivel = document.getElementById('nivelJogador').value;

  const msg = `Quero entrar na VOID X:%0A Nome:${nome}%0A ID:${id}%0A Nível:${nivel}`;

  window.open(`https://wa.me/5189612793?text=${msg}`, '_blank');
});

// RANKING + STORAGE

const rankingDiv = document.getElementById('ranking');
const semanaDiv = document.getElementById('destaqueSemana');
const mesDiv = document.getElementById('destaqueMes');

function salvar(){
  localStorage.setItem('ranking', rankingDiv.innerHTML);
  localStorage.setItem('semana', semanaDiv.innerHTML);
  localStorage.setItem('mes', mesDiv.innerHTML);
}

function carregar(){
  rankingDiv.innerHTML = localStorage.getItem('ranking') || '';
  semanaDiv.innerHTML = localStorage.getItem('semana') || '';
  mesDiv.innerHTML = localStorage.getItem('mes') || '';
}

// ADD

document.getElementById('addRank').onclick = () => {
  const nome = document.getElementById('nomeRank').value;
  const pontos = document.getElementById('pontosRank').value;
  rankingDiv.innerHTML += `<div class='card'>${nome} - ${pontos} pts</div>`;
  salvar();
};

document.getElementById('addSemana').onclick = () => {
  const nome = document.getElementById('nomeSemana').value;
  semanaDiv.innerHTML += `<div class='card'>🔥 ${nome}</div>`;
  salvar();
};

document.getElementById('addMes').onclick = () => {
  const nome = document.getElementById('nomeMes').value;
  mesDiv.innerHTML += `<div class='card'>👑 ${nome}</div>`;
  salvar();
};

// FECHAR AO CLICAR FORA
window.onclick = function(e){
  if(e.target === eventoModal) eventoModal.style.display='none';
  if(e.target === loginModal) loginModal.style.display='none';
  if(e.target === adminModal) adminModal.style.display='none';
};

carregar();
</script></body>
 </html>
